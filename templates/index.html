<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docs - Docket</title>
    <style>
      body {
        background-color: #1b1d61;
        color: #ffffff;
      }
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      #content {
        max-width: 500px;
        margin: auto;
      }
    </style>
</head>
<body>
    <div id="content">
      <script src="{{ url_for('static', filename='marked.min.js') }}"></script>
      <script>
          const markdownString = "# Docs\n- [Readme](/readme)";
          document.getElementById('content').innerHTML = marked.parse(markdownString);
      </script>
    </div>
</body>
</html>
