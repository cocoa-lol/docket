<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents - Docket</title>
  <style>
    body {
      background-color: #ad6a6a;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="nav-links"></div>
  
  <script>
    async function getApiDocs() {
      try {
        let port = window.location.port;
        const response = await fetch(`http://localhost:${port}/api/sites`);
        const data = await response.json();
        
        // 1. Create an empty array to hold our HTML strings
        let linksHtml = [];

        // 2. Loop through the API data and push the <a> tags into the array
        for (const element of data) {
          linksHtml.push(`<a href="/docs/${element}">${element}</a><br>`);
        }

        // 3. Join the array items together and inject them into the DOM
        document.getElementById('nav-links').innerHTML = linksHtml.join('');

      } catch (error) {
        console.error('Error:', error);
      }
    }

    getApiDocs();
  </script>
</body>
</html>
