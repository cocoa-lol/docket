      <script>
          const markdownString = `
          Welcome to Docket!

Docket is FOSS, that gives you full creativity to your documents.

# Arguments
- --port (Defaults to HTTP 80)

To add to your document pages, add an HTML file in /templates/docs/. The document name should be all the same across "document". 
Inside index.html, add \`\n[document](/document)\`. It should look like:

\`\`\`<script>

          const markdownString = "# Docs\n- [Readme](/readme)\n[document](/document)";

          document.getElementById('content').innerHTML = marked.parse(markdownString);

      <\/script>`;
          document.getElementById('content').innerHTML = marked.parse(markdownString);
      </script>\`\`\`
